<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    max-width:900px;
    width:100%;
    background:#fff;
    border-radius:18px;
    padding:50px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:42px;
    color:#222;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:40px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

a{
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    background:#111827;
    color:white;
    height:65px;
    border-radius:12px;
    font-size:17px;
    font-weight:600;
    transition:.25s;
}

a:hover{
    background:#374151;
    transform:translateY(-3px);
}
</style>
